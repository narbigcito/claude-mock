services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-claude_mock}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-claude_mock}
      POSTGRES_DB: ${POSTGRES_DB:-claude_mock_prod}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-claude_mock} -d ${POSTGRES_DB:-claude_mock_prod}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ecto://${POSTGRES_USER:-claude_mock}:${POSTGRES_PASSWORD:-claude_mock}@db/${POSTGRES_DB:-claude_mock_prod}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      PHX_HOST: ${PHX_HOST:-localhost}
      PHX_SERVER: "true"
      PORT: "4004"
      SEED_ON_BOOT: ${SEED_ON_BOOT:-true}
      CONVERSATIONS_DIR: /data/conversations
      PANOPTIKON_BASE_URL: ${PANOPTIKON_BASE_URL:-https://panoptikon.narbigcito.com/v1}
      PANOPTIKON_API_KEY: ${PANOPTIKON_API_KEY}
      PANOPTIKON_MODEL: ${PANOPTIKON_MODEL:-kimi-k2-turbo-preview}
    ports:
      - "4004:4004"
    volumes:
      # Drop new *.json files here and restart the container (or run `bin/seed`)
      # to import them. Safe to keep mounted — the seeder skips existing titles.
      - ./priv/conversations:/data/conversations:ro
    entrypoint: ["/app/entrypoint.sh"]
    command: ["/app/bin/server"]

volumes:
  db_data:
