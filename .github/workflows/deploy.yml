name: Deploy to Production

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is reachable from main
        run: |
          git fetch origin main --depth=0
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "❌ Tag ${GITHUB_REF_NAME} is not on the main branch. Aborting deploy."
            exit 1
          fi
          echo "✅ Tag ${GITHUB_REF_NAME} verified on main."

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          log-public-key: false

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Configure SSH for Cloudflare
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config << 'EOF'
          Host ssh.narbigcito.com
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy to production
        env:
          SSH_HOST: ssh.narbigcito.com
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          CLOUDFLARED_SERVICE_TOKEN_ID: ${{ secrets.CLOUDFLARE_SERVICE_TOKEN_ID }}
          CLOUDFLARED_SERVICE_TOKEN_SECRET: ${{ secrets.CLOUDFLARE_SERVICE_TOKEN_SECRET }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          echo "🚀 Deploying tag ${RELEASE_TAG} to production..."

          ssh $SSH_USER@ssh.narbigcito.com << EOF
            set -e

            echo "📁 Navigating to project directory..."
            cd $DEPLOY_PATH

            echo "⬇️  Fetching tag ${RELEASE_TAG}..."
            git fetch origin --tags --force
            git checkout --force "${RELEASE_TAG}"

            echo "🐳 Deploying with Docker Compose..."
            docker compose -f docker-compose.prod.yml down || true
            docker compose -f docker-compose.prod.yml up -d --build

            echo "🧹 Cleaning up old Docker images..."
            docker image prune -f

            echo "✅ Deployment complete!"
            echo ""
            echo "📊 Checking container status..."
            docker ps | grep claude-mock || echo "⚠️ Warning: Container may not be running"
          EOF

          echo "🎉 Deployment of ${RELEASE_TAG} finished successfully!"

      - name: Verify deployment
        env:
          SSH_HOST: ssh.narbigcito.com
          SSH_USER: ${{ secrets.SSH_USER }}
          CLOUDFLARED_SERVICE_TOKEN_ID: ${{ secrets.CLOUDFLARE_SERVICE_TOKEN_ID }}
          CLOUDFLARED_SERVICE_TOKEN_SECRET: ${{ secrets.CLOUDFLARE_SERVICE_TOKEN_SECRET }}
        run: |
          echo "🔍 Verifying deployment..."
          sleep 5

          if ssh $SSH_USER@ssh.narbigcito.com "docker ps | grep -q claude-mock"; then
            echo "✅ Container is running"
          else
            echo "❌ Container is not running"
            exit 1
          fi

          echo ""
          echo "🌐 Application deployed at: https://claude-mock.narbigcito.com"
          echo "🏷️  Released version: ${{ github.ref_name }}"
